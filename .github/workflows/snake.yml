name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Terminal Neon Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#00E5FF&color_dots=#0d1117,#003b00,#007a00,#00b000,#39ff14
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#00FF41
            dist/github-snake.gif?color_snake=#00FF41&color_dots=#0d1117,#003b00,#007a00,#00b000,#39ff14&color_background=#020617
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push snake to output branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
          commit_message: "Generate terminal neon snake"
